services:
  - type: web
    name: merryphoto
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
      - key: SERVER_SECRET
        sync: false
    disk:
      name: merryphoto-data
      mountPath: /var/data
      sizeGB: 1
